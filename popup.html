<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Zara - Your Local Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      height: 600px;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 100%);
      color: #f1f5f9;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #2d2d3a;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #ffb347;
      border-radius: 10px;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 18px 16px 20px 16px;
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 18px;
      border-bottom: 1px solid rgba(255, 180, 71, 0.3);
      padding-bottom: 8px;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      background: linear-gradient(135deg, #FFB347, #FF8C42);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .badge {
      font-size: 10px;
      background: #2a2a3c;
      padding: 4px 8px;
      border-radius: 40px;
      color: #FFB347;
      font-weight: 500;
    }

    .conversation-panel {
      flex: 1;
      background: #13131f;
      border-radius: 24px;
      padding: 14px;
      overflow-y: auto;
      margin-bottom: 16px;
      border: 1px solid #262636;
    }
    .message {
      margin-bottom: 18px;
      animation: fadeInUp 0.2s ease;
    }
    .user-msg { text-align: right; }
    .user-bubble {
      display: inline-block;
      background: #2c2c42;
      padding: 8px 14px;
      border-radius: 24px 24px 8px 24px;
      max-width: 85%;
      font-size: 13px;
      line-height: 1.4;
      color: #FFE6C7;
      word-break: break-word;
    }
    .assistant-msg { text-align: left; }
    .assistant-bubble {
      background: #1f1f30;
      padding: 10px 14px;
      border-radius: 24px 24px 24px 8px;
      max-width: 90%;
      font-size: 13px;
      line-height: 1.45;
      color: #e2e8f0;
      border-left: 3px solid #ffb347;
      word-break: break-word;
    }
    .timestamp {
      font-size: 9px;
      color: #6b7280;
      margin-top: 4px;
      margin-left: 8px;
    }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e1e2c;
      padding: 10px 14px;
      border-radius: 28px;
      margin-bottom: 16px;
      border: 1px solid #2c2c3e;
    }
    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      color: #ffb347;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #3a3a50;
      transition: 0.2s;
      border-radius: 22px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.2s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #ffb347;
    }
    input:checked + .slider:before {
      transform: translateX(22px);
    }

    .input-area {
      background: #1e1e2c;
      border-radius: 28px;
      padding: 8px 12px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      border: 1px solid #2e2e42;
    }
    .input-area:focus-within {
      border-color: #ffb347;
    }
    #questionInput {
      flex: 1;
      background: transparent;
      border: none;
      color: #ffffff;
      font-size: 14px;
      resize: none;
      font-family: inherit;
      outline: none;
      max-height: 80px;
      padding: 8px 0;
    }
    #questionInput::placeholder {
      color: #5f6c84;
    }
    .icon-btn {
      background: #2d2d40;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #facc15;
      font-size: 18px;
    }
    .icon-btn:hover {
      background: #ffb347;
      color: #0f0f1a;
    }
    #sendBtn {
      background: #ffb347;
      color: #12121c;
      font-weight: bold;
      width: auto;
      border-radius: 40px;
      padding: 0 18px;
      font-size: 14px;
      border: none;
      cursor: pointer;
      height: 38px;
    }
    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .clear-btn {
      background: #2c2c40;
      border: none;
      padding: 8px 12px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 500;
      color: #dddddd;
      cursor: pointer;
      flex: 1;
    }
    .clear-btn:hover {
      background: #3e3e58;
    }
    .status {
      font-size: 10px;
      text-align: center;
      margin-top: 10px;
      color: #a0aec0;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px);}
      to { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>ZARA</h1>
    <div class="badge">always listen · voice · apps</div>
  </div>

  <!-- Always-listen toggle row -->
  <div class="toggle-row">
    <span class="toggle-label">🎤 Always listen (say "Zara ...")</span>
    <label class="switch">
      <input type="checkbox" id="alwaysListenToggle">
      <span class="slider round"></span>
    </label>
  </div>

  <div class="conversation-panel" id="conversationPanel">
    <div style="text-align:center; color:#6b7280; margin-top:30px;">✨ Ask me anything local: time, date, open apps, search YouTube</div>
  </div>

  <div class="input-area">
    <textarea id="questionInput" rows="1" placeholder="Type or speak...  e.g., 'open youtube', 'what time is it?', 'search physics class 12 on youtube'"></textarea>
    <button id="micBtn" class="icon-btn" title="Voice input">🎙️</button>
    <button id="sendBtn">Send</button>
  </div>
  <div class="action-buttons">
    <button id="clearMemoryBtn" class="clear-btn">🗑️ Clear chat</button>
  </div>
  <div class="status" id="statusMsg">✓ Ready · Ctrl+Shift+Z to open Zara</div>
</div>
<script src="popup.js"></script>
</body>
</html>
