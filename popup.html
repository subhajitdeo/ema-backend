<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zara AI - Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-area">
                <h1>ZARA<span>.ai</span></h1>
                <p>background active • always listening</p>
            </div>
        </div>
        <div class="api-status">
            <i class="fas fa-key"></i>
            <input type="password" id="apiKeyInput" placeholder="OpenRouter API Key">
            <button id="saveApiKeyBtn" class="glass-btn">Save</button>
        </div>
        <div class="model-selector">
            <i class="fas fa-brain"></i>
            <select id="modelSelect">
                <option value="deepseek/deepseek-chat-v3-0324:free">DeepSeek</option>
                <option value="ring-2.6-1t:free" selected>Ring-2.6-1T</option>
                <option value="google/gemma-3-27b-it:free">Gemma 3</option>
                <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3</option>
            </select>
        </div>
        <div class="continuous-toggle">
            <label>
                <input type="checkbox" id="continuousModeToggle" checked> Continuous Listening
            </label>
        </div>
        <div class="footer-note">Zara runs in background. Speak naturally anytime. Say "summarise this page" or "close tab".</div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
